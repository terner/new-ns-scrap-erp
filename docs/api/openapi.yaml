    post:
      tags: [Purchase]
      operationId: createPurchasePoBuy
      summary: Create PO Buy
      description: >
        Creates a delivery PO Buy or costing-only PO Buy using the legacy
        add-list workflow. The server generates `POB{branchCode}{YYMM}-NNNN`, calculates
        totals from item rows, and sets remaining quantity/status from
        `requireDelivery`.
      requestBody:
        required: true
