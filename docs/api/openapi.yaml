            type: string
        - name: branchId
          in: query
          description: Optional branch filter when backing source rows expose a consistent branch reference.
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [xlsx]
      responses:
        "200":
          description: Product tracking rows, purchase/sales/stock movement summary, monthly trend, or xlsx export when `format=xlsx`.
          content:
            application/json:
              schema:
                type: object
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/trading/matching:
    get:
      tags: [Trading]
      operationId: readTradingMatching
      summary: Read trading matching baseline
      description: >
        Read-only Trading Matching contract for Batch D4. Supports filtered
        deal reads and XLSX export; create/update/reverse/recalc actions are
        deferred until idempotency and reconciliation rules are locked.
      parameters:
        - $ref: "#/components/parameters/TradingMatchingQ"
        - $ref: "#/components/parameters/TradingMatchingStatus"
        - $ref: "#/components/parameters/TradingMatchingFrom"
        - $ref: "#/components/parameters/TradingMatchingTo"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Trading matching rows as JSON or XLSX export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingMatchingResponse"
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/dual-costing/cost-pool:
    get:
      tags: [Dual Costing]
      operationId: readCostPool
      summary: Read Cost Pool baseline
      description: >
        Read-only Cost Pool contract for Batch D5. Rows are derived from PO Buy,
        purchase bills, production outputs, grade adjustments, and currently
        known trading usage. Allocation/write/reverse/recalc actions are
        deferred until reconciliation rules and source links are locked.
      parameters:
        - $ref: "#/components/parameters/CostPoolQ"
        - $ref: "#/components/parameters/CostPoolProductId"
        - $ref: "#/components/parameters/CostPoolCostType"
        - $ref: "#/components/parameters/CostPoolSourceType"
        - $ref: "#/components/parameters/CostPoolStatus"
        - $ref: "#/components/parameters/CostPoolAvailableOnly"
        - $ref: "#/components/parameters/CostPoolSort"
        - $ref: "#/components/parameters/CostPoolFrom"
        - $ref: "#/components/parameters/CostPoolTo"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Cost Pool rows as JSON or XLSX export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostPoolResponse"
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/dual-costing/cost-allocator:
    get:
      tags: [Dual Costing]
      operationId: readCostAllocator
      summary: Read Cost Allocator simulation baseline
      description: >
        Read-only Cost Allocator contract for Batch D6. Returns product options,
        open PO Sell rows, available Cost Pool lots, and simulated allocation
        candidates by FIFO/LIFO/Cheap/Expensive mode. Confirm/write/reverse
        actions are deferred until allocation logs and reconciliation rules are
        locked.
      parameters:
        - $ref: "#/components/parameters/CostPoolProductId"
        - name: poSellId
          in: query
          schema:
            type: string
          description: Derived PO Sell line id returned by this endpoint.
        - name: mode
          in: query
          schema:
            type: string
            enum: [FIFO, LIFO, Cheap, Expensive]
            default: FIFO
      responses:
        "200":
          description: Cost Allocator read-only simulation model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostAllocatorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/dual-costing/match-log:
    get:
      tags: [Dual Costing]
      operationId: readMatchLog
      summary: Read Match Log baseline
      description: >
        Read-only Match Log baseline for Batch D7a. Uses existing
        `trading_deals` as the current source because a normalized allocation
        log table is not present yet; reverse/write actions remain deferred.
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: matchType
          in: query
          schema:
            type: string
            enum: [sales]
        - name: costType
          in: query
          schema:
            type: string
            enum: [Purchase]
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, reversed]
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Match Log rows as JSON or XLSX export
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/dual-costing/deal-margin:
    get:
      tags: [Dual Costing]
      operationId: readDealMargin
      summary: Read Deal Margin baseline
      description: >
        Read-only Deal Margin baseline for Batch D7b using existing
        `trading_deals` matched sales and purchase amounts.
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: channel
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Deal margin rows as JSON or XLSX export
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/dual-costing/compare-margin:
    get:
      tags: [Dual Costing]
      operationId: readCompareMargin
      summary: Read Compare Deal vs Stock baseline
      description: >
        Read-only Compare Margin baseline for Batch D7c. Deal side reads
        `trading_deals`; stock side reads `sales_bills` revenue and
        cogs/total_cost where available.
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Deal vs stock aggregate comparison
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/trading/dashboard:
    get:
      tags: [Trading]
      operationId: readTradingDashboard
      summary: Read trading dashboard baseline
      description: >
        Read-only Trading Dashboard contract for Batch D3. Dashboard exposes
        deal summaries, status breakdown, trend, top products, and recent deals
        from `trading_deals`; write/matching actions stay in deferred flows.
      parameters:
        - $ref: "#/components/parameters/TradingDashboardQ"
        - $ref: "#/components/parameters/TradingDashboardStatus"
        - $ref: "#/components/parameters/TradingDashboardFrom"
        - $ref: "#/components/parameters/TradingDashboardTo"
      responses:
        "200":
          description: Trading dashboard read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingDashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/po-reports/outstanding:
    get:
      tags: [PO Reports]
      summary: Read PO buy/sell outstanding baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

components:
  securitySchemes:
    SupabaseSession:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: Supabase Auth session cookie or equivalent authenticated request context.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 10000
    Search:
      name: search
      in: query
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 10
        maximum: 500
        default: 50
    Format:
      name: format
      in: query
      schema:
        type: string
        enum: [json, xlsx]
        default: json
    POSellMatchStatus:
      name: matchStatus
      in: query
      schema:
        type: string
        enum: [all, Not Matched, Partially Matched, Fully Matched, Over Matched]
        default: all
    POSellQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
      description: Search by `docNo`, customer, product, channel, branch, or related deal reference.
    POSellStatus:
      name: status
      in: query
      schema:
        type: string
        maxLength: 40
      description: Raw PO Sell status from `po_sells.status`; display normalization is read-only.
    POSellFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
      description: Inclusive PO Sell date lower bound.
    POSellTo:
      name: to
      in: query
      schema:
        type: string
        format: date
      description: Inclusive PO Sell date upper bound.
    POBuyFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
      description: Inclusive PO Buy date lower bound.
    POBuyPurpose:
      name: purpose
      in: query
      schema:
        type: string
        enum: [all, delivery, costing]
        default: all
      description: Filters delivery PO rows versus costing-only pool rows.
    POBuyQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
      description: Search by `docNo`, supplier, product, status, or purpose.
    POBuyStatus:
      name: status
      in: query
      schema:
        type: string
        maxLength: 40
      description: Raw PO Buy status from `po_buys.status`; display normalization is read-only.
    POBuyTo:
      name: to
      in: query
      schema:
        type: string
        format: date
      description: Inclusive PO Buy date upper bound.
    TradingDashboardFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
      description: Inclusive trading deal date lower bound.
    TradingDashboardQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
      description: Search by `dealNo`, purchase bill, sales bill, supplier, customer, product, or status.
    TradingDashboardStatus:
      name: status
      in: query
      schema:
        type: string
        maxLength: 40
      description: Raw Trading Deal status from `trading_deals.status`; cancelled detection normalizes casing only for summary exclusion.
    TradingDashboardTo:
      name: to
      in: query
      schema:
        type: string
        format: date
      description: Inclusive trading deal date upper bound.
    TradingMatchingFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
      description: Inclusive trading deal date lower bound.
    TradingMatchingQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
      description: Search by `dealNo`, purchase bill, sales bill, supplier, customer, product, or status.
    TradingMatchingStatus:
      name: status
      in: query
      schema:
        type: string
        maxLength: 40
      description: Raw Trading Deal status from `trading_deals.status`.
    TradingMatchingTo:
      name: to
      in: query
      schema:
        type: string
        format: date
      description: Inclusive trading deal date upper bound.
    CostPoolAvailableOnly:
      name: availableOnly
      in: query
      schema:
        type: boolean
        default: true
      description: When true, only rows with available quantity greater than zero are returned.
    CostPoolCostType:
      name: costType
      in: query
      schema:
        type: string
        enum: [Purchase, Production, Regrade]
      description: Filter by derived Cost Pool cost type.
    CostPoolFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
      description: Inclusive Cost Pool source date lower bound.
    CostPoolProductId:
      name: productId
      in: query
      schema:
        type: string
      description: Filter by target product id.
    CostPoolQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
      description: Search by source number, source type, cost type, counterparty, product, or status.
    CostPoolSort:
      name: sort
      in: query
      schema:
        type: string
        enum: [FIFO, LIFO, Cheap, Expensive]
        default: FIFO
      description: Read ordering for available cost lots.
    CostPoolSourceType:
      name: sourceType
      in: query
      schema:
        type: string
        enum: [PO_Buy, Spot_Buy, Production, Regrade]
      description: Filter by derived source type.
    CostPoolStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [Available, Partially Used, Fully Used]
      description: Filter by usage status after known matched value has been applied.
    CostPoolTo:
      name: to
      in: query
      schema:
        type: string
        format: date
      description: Inclusive Cost Pool source date upper bound.
    StockAsOf:
      name: asOf
      in: query
      schema:
        type: string
        format: date
    StockBranchId:
      name: branchId
      in: query
      schema:
        type: string
    StockFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
    StockLotNo:
      name: lotNo
      in: query
      schema:
        type: string
        maxLength: 80
    StockProductId:
      name: productId
      in: query
      schema:
        type: string
    StockQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
    StockRefType:
      name: refType
      in: query
      schema:
        type: string
        maxLength: 20
    StockStatus:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/StockStatus"
    StockTo:
      name: to
      in: query
      schema:
        type: string
        format: date
    StockWarehouseId:
      name: warehouseId
      in: query
      schema:
        type: string
    MasterResource:
      name: resource
      in: path
      required: true
      schema:
        type: string
        enum:
          - accounts
          - bank-names
          - beneficiaries
          - branches
          - channels
          - currencies
          - directors
          - expense-categories
          - machines
          - payment-methods
          - product-types
          - product-units
          - production-lines
          - remittance-purposes
          - salespersons
          - warehouses
  requestBodies:
    JsonBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Ok:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiObject"
    ListOk:
      description: Successful list response
      content:
        application/json:
          schema:
            oneOf:
              - type: array
                items:
                  type: object
                  additionalProperties: true
              - $ref: "#/components/schemas/ApiObject"
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid Supabase session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated user lacks the required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    StockWriteOk:
      description: Stock write completed and traceable ledger rows were created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StockWriteResponse"
  schemas:
    ApiObject:
      type: object
      additionalProperties: true
    CustomerReturnRequest:
      allOf:
        - $ref: "#/components/schemas/StockBaseWriteRequest"
        - type: object
          required: [action, branchId, date, productId, qty, reason, unitCost, warehouseId]
          properties:
            action:
              type: string
              enum: [receive, send_back]
              default: receive
            customerId:
              type: [string, "null"]
            deliveryRefNo:
              $ref: "#/components/schemas/OptionalDocNo"
            qty:
              type: number
              exclusiveMinimum: 0
            reason:
              type: string
              minLength: 2
              maxLength: 240
            returnRowKey:
              type: [string, "null"]
            unitCost:
              type: number
              minimum: 0
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      additionalProperties: true
    FcdLedgerAccountOption:
      type: object
      required: [currency, id, label, name]
      properties:
        accountNo:
          type: [string, "null"]
        bankName:
          type: string
        branchName:
          type: string
        code:
          type: [string, "null"]
        currency:
          type: string
        id:
          type: string
        label:
          type: string
        name:
          type: string
        openingBalance:
          type: number
        type:
          type: string
      additionalProperties: true
    FcdLedgerListResponse:
      type: object
      required: [account, filters, rows, summary]
      properties:
        account:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/FcdLedgerAccountOption"
        filters:
          type: object
          required: [accounts]
          properties:
            accounts:
              type: array
              items:
                $ref: "#/components/schemas/FcdLedgerAccountOption"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/FcdLedgerRow"
        summary:
          type: object
          required: [accountCount, currency, foreignBalance, rows, thbBalance]
          properties:
            accountCount:
              type: integer
            currency:
              type: string
            foreignBalance:
              type: number
              description: Conservative foreign balance. In FF4 this includes opening balance only unless source foreign amounts are available.
            rows:
              type: integer
            thbBalance:
              type: number
      additionalProperties: true
    FcdLedgerRow:
      type: object
      required: [date, foreignBal, foreignIn, foreignOut, fxRate, id, refNo, thbBal, thbIn, thbOut, type]
      properties:
        date:
          type: string
        description:
          type: string
        foreignBal:
          type: number
        foreignIn:
          type: number
          description: Zero when source foreign amount is unavailable from active tables.
        foreignOut:
          type: number
          description: Zero when source foreign amount is unavailable from active tables.
        fxRate:
          type: number
          description: Historical FX reference from fx_rates when available, not used to infer foreign movement.
        id:
          type: string
        refNo:
          type: string
        thbBal:
          type: number
        thbIn:
          type: number
        thbOut:
          type: number
        type:
          type: string
      additionalProperties: true
    FxGainLossReportListResponse:
      type: object
      required: [filters, rows, schemaState, summary]
      properties:
        filters:
          type: object
          required: [currencies, refTypes]
          properties:
            currencies:
              type: array
              items:
                type: string
            refTypes:
              type: array
              items:
                type: string
        rows:
          type: array
          items:
            $ref: "#/components/schemas/FxGainLossReportRow"
        schemaState:
          type: object
          properties:
            realizedOnly:
              type: boolean
            referenceResolution:
              type: string
            sourceTable:
              type: string
            unrealizedSource:
              type: string
            writeBehavior:
              type: string
          additionalProperties: true
        summary:
          type: object
          required: [net, rows, totalGain, totalLoss]
          properties:
            net:
              type: number
            rows:
              type: integer
            totalGain:
              type: number
            totalLoss:
              type: number
      additionalProperties: true
    FxGainLossReportRow:
      type: object
      required: [currency, date, foreignAmount, fxGainLossAmount, gainLossType, id, originalFxRate, originalThbValue, reference, settlementFxRate, settlementThbValue, transactionType]
      properties:
        currency:
          type: string
        date:
          type: string
          format: date
        foreignAmount:
          type: number
        fxGainLossAmount:
          type: number
        gainLossType:
          type: string
          enum: [gain, loss, neutral]
        id:
          type: string
        notes:
          type: string
        originalFxRate:
          type: number
        originalThbValue:
          type: number
        reference:
          type: string
          description: Business reference from bank_statement.ref_no when resolvable; never expose opaque ref_id as the primary display.
        referenceNo:
          type: [string, "null"]
        settlementFxRate:
          type: number
        settlementThbValue:
          type: number
        sourceRefId:
          type: [string, "null"]
        transactionType:
          type: string
      additionalProperties: true
    FxRateListResponse:
      type: object
      required: [filters, latestRates, rows, summary]
      properties:
        filters:
          type: object
          required: [currencies, fromCurrencies, rateTypes, toCurrencies]
          properties:
            currencies:
              type: array
              items:
                type: object
                additionalProperties: true
            fromCurrencies:
              type: array
              items:
                type: string
            rateTypes:
              type: array
              items:
                type: string
            toCurrencies:
              type: array
              items:
                type: string
        latestRates:
          type: array
          items:
            $ref: "#/components/schemas/FxRateRow"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/FxRateRow"
        summary:
          type: object
          required: [activeRows, latestPairs, rows]
          properties:
            activeRows:
              type: integer
            latestPairs:
              type: integer
            rows:
              type: integer
      additionalProperties: true
    FxRateRow:
      type: object
      required: [active, fromCurrency, id, rate, rateDate, rateType, toCurrency]
      properties:
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        fromCurrency:
          type: string
          minLength: 3
          maxLength: 6
        id:
          type: string
          description: Internal FX rate id. UI should display currency pair/date/rate type instead of opaque ids.
        note:
          type: [string, "null"]
        rate:
          type: number
          exclusiveMinimum: 0
        rateDate:
          type: string
          format: date
        rateType:
          type: string
        source:
          type: [string, "null"]
        toCurrency:
          type: string
          minLength: 3
          maxLength: 6
        updatedAt:
          type: string
          format: date-time
      additionalProperties: true
    FxRateWriteRequest:
      type: object
      required: [fromCurrency, rate, rateDate, rateType, toCurrency]
      properties:
        active:
          type: boolean
          default: true
        fromCurrency:
          type: string
          minLength: 3
          maxLength: 6
          pattern: "^[A-Z0-9]{3,6}$"
        id:
          type: [string, "null"]
          maxLength: 80
        note:
          type: [string, "null"]
          maxLength: 500
        rate:
          type: number
          exclusiveMinimum: 0
        rateDate:
          type: string
          format: date
        rateType:
          type: string
          maxLength: 60
        source:
          type: [string, "null"]
          maxLength: 120
        toCurrency:
          type: string
          minLength: 3
          maxLength: 6
          pattern: "^[A-Z0-9]{3,6}$"
          default: THB
      additionalProperties: false
    FxRateWriteResponse:
      type: object
      required: [row]
      properties:
        row:
          $ref: "#/components/schemas/FxRateRow"
    OptionalDocNo:
      type: [string, "null"]
      maxLength: 40
      pattern: "^[A-Za-z0-9_-]+$"
    POSellListResponse:
      type: object
      required: [rows]
      properties:
        rows:
