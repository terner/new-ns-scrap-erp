openapi: 3.1.0
info:
  title: NS Scrap ERP Next API
  version: 0.1.0
  description: >
    Baseline API catalog for the active Next.js app. This file records current
    route handlers first; detailed request and response schemas should be added
    as each module batch hardens its contract.
servers:
  - url: http://localhost:3000
    description: Local Next.js development server
  - url: https://new-ns-scrap-erp.vercel.app
    description: Current Vercel deployment, if available
security:
  - SupabaseSession: []
tags:
  - name: Admin
  - name: Auth
  - name: Daily
  - name: Finance
  - name: Health
  - name: Master Data
  - name: PO Reports
  - name: Production
  - name: Purchase
  - name: Sales
  - name: Stock
  - name: Tracking
  - name: Trading
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Return application health status
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Return current authenticated app user context
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/company-profile:
    get:
      tags: [Admin]
      summary: Read company profile used for print/header data
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      tags: [Admin]
      summary: Update company profile
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/auth-events:
    get:
      tags: [Admin]
      summary: List authentication and activity audit events
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/transaction-ledger:
    get:
      tags: [Admin]
      summary: List transaction ledger entries
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, xlsx]
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List app users, roles, permissions, and branch access data
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      summary: Create an app user shell and role/profile assignment
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}:
    patch:
      tags: [Admin]
      summary: Update an app user profile, role, or permission settings
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/status:
    patch:
      tags: [Admin]
      summary: Activate or deactivate an app user
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/invite:
    post:
      tags: [Admin]
      summary: Send or resend an auth invitation for an app user
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/daily/payment-approval:
    get:
      tags: [Daily]
      summary: List payment approval queue baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/daily/expenses:
    get:
      tags: [Daily]
      summary: List expenses
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Create an expense and related bank statement row when applicable
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/transfers:
    get:
      tags: [Daily]
      summary: List account transfers
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Create a transfer and deterministic bank statement rows
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/petty-advances:
    get:
      tags: [Daily]
      summary: List petty advances and director loans
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Create a petty advance or director loan
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/petty-advances/returns:
    post:
      tags: [Daily]
      summary: Record a petty advance return
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/bill-swap-history:
    get:
      tags: [Daily]
      summary: List supplier swap history for bills
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/finance/ap:
    get:
      tags: [Finance]
      operationId: listFinanceAp
      summary: List AP aging and supplier payable baseline
      parameters:
        - name: branchId
          in: query
          schema:
            type: string
        - name: supplierId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sortKey
          in: query
          schema:
            type: string
            enum: [date, docNo, dueDate, payableBalance, supplierName, aging]
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: format
          in: query
          schema:
            type: string
            enum: [xlsx]
      responses:
        "200":
          description: AP aging payload or xlsx export when `format=xlsx`.
          content:
            application/json:
              schema:
                type: object
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance/ar:
    get:
      tags: [Finance]
      operationId: listFinanceAr
      summary: List AR aging and customer receivable baseline
      parameters:
        - name: branchId
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sortKey
          in: query
          schema:
            type: string
            enum: [date, docNo, dueDate, receivableBalance, customerName, aging]
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: format
          in: query
          schema:
            type: string
            enum: [xlsx]
      responses:
        "200":
          description: AR aging payload or xlsx export when `format=xlsx`.
          content:
            application/json:
              schema:
                type: object
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance/bank:
    get:
      tags: [Finance]
      operationId: listFinanceBankStatement
      summary: List bank statement rows with running balance
      parameters:
        - name: accountId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: refType
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: format
          in: query
          schema:
            type: string
            enum: [xlsx]
      responses:
        "200":
          description: Bank statement payload or xlsx export when `format=xlsx`.
          content:
            application/json:
              schema:
                type: object
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance/cash-position:
    get:
      tags: [Finance]
      operationId: readFinanceCashPosition
      summary: Read cash position, account balances, and AR/AP exposure
      responses:
        "200":
          description: Cash position aggregation payload.
          content:
            application/json:
              schema:
                type: object
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/master-data/{resource}:
    get:
      tags: [Master Data]
      summary: List a generic master data resource
      description: Covers branches, warehouses, accounts, bank-names, salespersons, currencies, expense-categories, channels, product-types, product-units, directors, machines, production-lines, beneficiaries, payment-methods, and remittance-purposes.
      parameters:
        - $ref: "#/components/parameters/MasterResource"
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Master Data]
      summary: Create a generic master data resource row
      parameters:
        - $ref: "#/components/parameters/MasterResource"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/master-data/{resource}/{id}:
    patch:
      tags: [Master Data]
      summary: Update a generic master data resource row
      parameters:
        - $ref: "#/components/parameters/MasterResource"
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/master-data/customers:
    get:
      tags: [Master Data]
      summary: List customers
      parameters:
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Master Data]
      summary: Create customer
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/master-data/customers/export:
    get:
      tags: [Master Data]
      summary: Export customers as spreadsheet
      responses:
        "200":
          description: XLSX file response

  /api/master-data/customers/{id}/status:
    patch:
      tags: [Master Data]
      summary: Toggle customer active status
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/master-data/suppliers:
    get:
      tags: [Master Data]
      summary: List suppliers
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Master Data]
      summary: Create supplier
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/master-data/suppliers/export:
    get:
      tags: [Master Data]
      summary: Export suppliers as spreadsheet
      responses:
        "200":
          description: XLSX file response

  /api/master-data/suppliers/{id}:
    patch:
      tags: [Master Data]
      summary: Update supplier
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/master-data/products:
    get:
      tags: [Master Data]
      summary: List products
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Master Data]
      summary: Create product
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/master-data/products/export:
    get:
      tags: [Master Data]
      summary: Export products as spreadsheet
      responses:
        "200":
          description: XLSX file response

  /api/master-data/products/{id}:
    patch:
      tags: [Master Data]
      summary: Update product
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/master-data/thai-address:
    get:
      tags: [Master Data]
      summary: Search Thai address reference data
      parameters:
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/production/orders:
    get:
      tags: [Production]
      summary: List production orders read baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/production/output-categories:
    get:
      tags: [Production]
      summary: List production output categories
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Production]
      summary: Create production output category
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/production/output-categories/{id}:
    patch:
      tags: [Production]
      summary: Update production output category
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/production/dashboard:
    get:
      tags: [Production]
      summary: Read production dashboard baseline
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/production/report:
    get:
      tags: [Production]
      summary: Read production yield report baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/production/wip-report:
    get:
      tags: [Production]
      summary: Read WIP report baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/production/production-cost-report:
    get:
      tags: [Production]
      summary: Read production cost report baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/production/yield-loss-report:
    get:
      tags: [Production]
      summary: Read yield/loss report baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/production/machine-utilization:
    get:
      tags: [Production]
      summary: Read machine utilization report baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/purchase/bills:
    get:
      tags: [Purchase]
      summary: List purchase bills
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Purchase]
      summary: Create purchase bill baseline
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
    patch:
      tags: [Purchase]
      summary: Update purchase bill baseline
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/purchase/payments:
    get:
      tags: [Purchase]
      summary: List supplier payments
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Purchase]
      summary: Create supplier payment
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/purchase/receipt-vouchers:
    get:
      tags: [Purchase]
      summary: List receipt vouchers
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/purchase/po-buy:
    get:
      tags: [Purchase]
      summary: List PO buy read baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/sales/bills:
    get:
      tags: [Sales]
      summary: List sales bills read baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/sales/stock-issue:
    get:
      tags: [Sales]
      summary: List stock issue read baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/sales/receipts:
    get:
      tags: [Sales]
      summary: List customer receipts
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Sales]
      summary: Create customer receipt
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/stock/ledger:
    get:
      tags: [Stock]
      operationId: listStockLedger
      summary: List stock ledger rows
      parameters:
        - $ref: "#/components/parameters/StockQ"
        - $ref: "#/components/parameters/StockProductId"
        - $ref: "#/components/parameters/StockBranchId"
        - $ref: "#/components/parameters/StockWarehouseId"
        - $ref: "#/components/parameters/StockStatus"
        - $ref: "#/components/parameters/StockLotNo"
        - $ref: "#/components/parameters/StockFrom"
        - $ref: "#/components/parameters/StockTo"
        - $ref: "#/components/parameters/StockRefType"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Stock ledger rows with pagination and summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLedgerResponse"
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stock/balance:
    get:
      tags: [Stock]
      operationId: getStockBalance
      summary: Read stock balance aggregated from stock ledger
      parameters:
        - $ref: "#/components/parameters/StockQ"
        - $ref: "#/components/parameters/StockProductId"
        - $ref: "#/components/parameters/StockBranchId"
        - $ref: "#/components/parameters/StockWarehouseId"
        - $ref: "#/components/parameters/StockStatus"
        - $ref: "#/components/parameters/StockLotNo"
        - $ref: "#/components/parameters/StockAsOf"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Format"
      responses:
        "200":
          description: Aggregated stock balance grouped by product, branch, warehouse, status, and lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockBalanceResponse"
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stock/transfer:
    get:
      tags: [Stock]
      summary: List stock transfers
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Stock]
      summary: Create stock transfer baseline
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/stock/status-convert:
    get:
      tags: [Stock]
      operationId: listStockStatusConverts
      summary: List stock status convert history
      responses:
        "200":
          description: Status convert rows and stock reference options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockOperationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Stock]
      operationId: createStockStatusConvert
      summary: Convert product stock status between RM, WIP, and FG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusConvertRequest"
      responses:
        "200":
          $ref: "#/components/responses/StockWriteOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stock/convert:
    get:
      tags: [Stock]
      operationId: listStockConverts
      summary: List grade/product conversion history
      responses:
        "200":
          description: Product conversion rows and stock reference options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockOperationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Stock]
      operationId: createStockConvert
      summary: Convert stock from one product/grade to another
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockConvertRequest"
      responses:
        "200":
          $ref: "#/components/responses/StockWriteOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stock/adjust:
    get:
      tags: [Stock]
      operationId: listStockAdjustments
      summary: List stock count adjustments
      responses:
        "200":
          description: Stock count adjustment rows and stock reference options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockOperationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Stock]
      operationId: createStockAdjustment
      summary: Create stock count adjustment and ledger movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustRequest"
      responses:
        "200":
          $ref: "#/components/responses/StockWriteOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stock/customer-return:
    get:
      tags: [Stock]
      operationId: listCustomerReturnStock
      summary: List customer return stock
      responses:
        "200":
          description: Customer return stock rows and stock reference options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockOperationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Stock]
      operationId: createCustomerReturnStockMovement
      summary: Receive or send back customer return stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerReturnRequest"
      responses:
        "200":
          $ref: "#/components/responses/StockWriteOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tracking/supplier:
    get:
      tags: [Tracking]
      summary: Read supplier tracking baseline
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/trading/matching:
    get:
      tags: [Trading]
      summary: Read trading matching baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/po-reports/outstanding:
    get:
      tags: [PO Reports]
      summary: Read PO buy/sell outstanding baseline
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

components:
  securitySchemes:
    SupabaseSession:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: Supabase Auth session cookie or equivalent authenticated request context.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 10000
    Search:
      name: search
      in: query
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 10
        maximum: 500
        default: 50
    Format:
      name: format
      in: query
      schema:
        type: string
        enum: [json, xlsx]
        default: json
    StockAsOf:
      name: asOf
      in: query
      schema:
        type: string
        format: date
    StockBranchId:
      name: branchId
      in: query
      schema:
        type: string
    StockFrom:
      name: from
      in: query
      schema:
        type: string
        format: date
    StockLotNo:
      name: lotNo
      in: query
      schema:
        type: string
        maxLength: 80
    StockProductId:
      name: productId
      in: query
      schema:
        type: string
    StockQ:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
    StockRefType:
      name: refType
      in: query
      schema:
        type: string
        maxLength: 20
    StockStatus:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/StockStatus"
    StockTo:
      name: to
      in: query
      schema:
        type: string
        format: date
    StockWarehouseId:
      name: warehouseId
      in: query
      schema:
        type: string
    MasterResource:
      name: resource
      in: path
      required: true
      schema:
        type: string
        enum:
          - accounts
          - bank-names
          - beneficiaries
          - branches
          - channels
          - currencies
          - directors
          - expense-categories
          - machines
          - payment-methods
          - product-types
          - product-units
          - production-lines
          - remittance-purposes
          - salespersons
          - warehouses
  requestBodies:
    JsonBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Ok:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiObject"
    ListOk:
      description: Successful list response
      content:
        application/json:
          schema:
            oneOf:
              - type: array
                items:
                  type: object
                  additionalProperties: true
              - $ref: "#/components/schemas/ApiObject"
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid Supabase session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated user lacks the required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    StockWriteOk:
      description: Stock write completed and traceable ledger rows were created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StockWriteResponse"
  schemas:
    ApiObject:
      type: object
      additionalProperties: true
    CustomerReturnRequest:
      allOf:
        - $ref: "#/components/schemas/StockBaseWriteRequest"
        - type: object
          required: [action, branchId, date, productId, qty, reason, unitCost, warehouseId]
          properties:
            action:
              type: string
              enum: [receive, send_back]
              default: receive
            customerId:
              type: [string, "null"]
            deliveryRefNo:
              $ref: "#/components/schemas/OptionalDocNo"
            qty:
              type: number
              exclusiveMinimum: 0
            reason:
              type: string
              minLength: 2
              maxLength: 240
            returnRowKey:
              type: [string, "null"]
            unitCost:
              type: number
              minimum: 0
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      additionalProperties: true
    OptionalDocNo:
      type: [string, "null"]
      maxLength: 40
      pattern: "^[A-Za-z0-9_-]+$"
    StockAdjustRequest:
      allOf:
        - $ref: "#/components/schemas/StockBaseWriteRequest"
        - type: object
          required: [branchId, countedQty, date, productId, reason, systemQty, warehouseId]
          properties:
            countedQty:
              type: number
              minimum: 0
            reason:
              type: string
              minLength: 3
              maxLength: 240
            remark:
              type: [string, "null"]
              maxLength: 500
            systemQty:
              type: number
              minimum: 0
    StockBalanceResponse:
      type: object
      required: [byStatus, page, pageSize, rows, summary, total]
      properties:
        byStatus:
          type: array
          items:
            type: object
            properties:
              count:
                type: integer
              qty:
                type: number
              status:
                $ref: "#/components/schemas/StockStatus"
              value:
                type: number
        page:
          type: integer
        pageSize:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/StockBalanceRow"
        summary:
          type: object
          additionalProperties: true
        total:
          type: integer
    StockBalanceRow:
      type: object
      properties:
        avgCost:
          type: number
        branchId:
          type: [string, "null"]
        branchName:
          type: [string, "null"]
        lastMovementDate:
          type: [string, "null"]
        lotNo:
          type: [string, "null"]
        notAvailableForSale:
          type: boolean
        productCode:
          type: [string, "null"]
        productId:
          type: string
        productName:
          type: [string, "null"]
        qty:
          type: number
        status:
          $ref: "#/components/schemas/StockStatus"
        value:
          type: number
        warehouseId:
          type: [string, "null"]
        warehouseName:
          type: [string, "null"]
    StockBaseWriteRequest:
      type: object
      required: [branchId, date, productId, warehouseId]
      properties:
        branchId:
          type: string
          minLength: 1
        date:
          type: string
          format: date
        docNo:
          $ref: "#/components/schemas/OptionalDocNo"
        lotNo:
          type: [string, "null"]
          maxLength: 80
        notes:
          type: [string, "null"]
          maxLength: 500
        productId:
          type: string
          minLength: 1
        warehouseId:
          type: string
          minLength: 1
    StockConvertRequest:
      type: object
      required: [branchId, date, sourceProductId, sourceQty, targetProductId, targetQty, warehouseId]
      properties:
        branchId:
          type: string
          minLength: 1
        date:
          type: string
          format: date
        docNo:
          $ref: "#/components/schemas/OptionalDocNo"
        lotNo:
          type: [string, "null"]
          maxLength: 80
        notes:
          type: [string, "null"]
          maxLength: 500
        reason:
          type: [string, "null"]
          maxLength: 240
        sourceProductId:
          type: string
          minLength: 1
        sourceQty:
          type: number
          exclusiveMinimum: 0
        targetLotNo:
          type: [string, "null"]
          maxLength: 80
        targetProductId:
          type: string
          minLength: 1
        targetQty:
          type: number
          exclusiveMinimum: 0
        warehouseId:
          type: string
          minLength: 1
    StockLedgerResponse:
      type: object
      required: [page, pageSize, rows, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        summary:
          type: object
          additionalProperties: true
        total:
          type: integer
    StockOption:
      type: object
      required: [id, name]
      properties:
        active:
          type: [boolean, "null"]
        branchId:
          type: [string, "null"]
        code:
          type: [string, "null"]
        id:
          type: string
        name:
          type: string
        status:
          type: [string, "null"]
    StockOperationListResponse:
      type: object
      required: [reference, rows]
      properties:
        reference:
          type: object
          required: [branches, products, warehouses]
          properties:
            branches:
              type: array
              items:
                $ref: "#/components/schemas/StockOption"
            customers:
              type: array
              items:
                $ref: "#/components/schemas/StockOption"
            products:
              type: array
              items:
                $ref: "#/components/schemas/StockOption"
            warehouses:
              type: array
              items:
                $ref: "#/components/schemas/StockOption"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
    StockStatus:
      type: string
      enum: [RM, WIP, FG]
    StockWriteResponse:
      type: object
      required: [ok]
      properties:
        id:
          type: string
        ok:
          type: boolean
        refId:
          type: string
        refNo:
          type: string
    StatusConvertRequest:
      allOf:
        - $ref: "#/components/schemas/StockBaseWriteRequest"
        - type: object
          required: [fromStatus, qty, toStatus]
          properties:
            fromStatus:
              $ref: "#/components/schemas/StockStatus"
            qty:
              type: number
              exclusiveMinimum: 0
            reason:
              type: [string, "null"]
              maxLength: 240
            toStatus:
              $ref: "#/components/schemas/StockStatus"
