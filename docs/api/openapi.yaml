openapi: 3.1.0
info:
  title: NS Scrap ERP Next API
  version: 0.1.0
  description: >
    Baseline API catalog for the active Next.js app. This file records current
    route handlers first; detailed request and response schemas should be added
    as each module batch hardens its contract.
servers:
  - url: http://localhost:3000
    description: Local Next.js development server
  - url: https://new-ns-scrap-erp.vercel.app
    description: Current Vercel deployment, if available
security:
  - SupabaseSession: []
tags:
  - name: Admin
  - name: Auth
  - name: Daily
  - name: Dual Costing
  - name: Finance
  - name: Finance Accounting
  - name: Health
  - name: Master Data
  - name: PO Reports
  - name: Production
  - name: Purchase
  - name: Sales
  - name: Stock
  - name: Tracking
  - name: Trading
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Return application health status
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Return current authenticated app user context
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/dashboard:
    get:
      tags: [Reports]
      operationId: readMainDashboard
      summary: Read main management dashboard baseline from purchase, sales, stock, finance, production, and trading sources
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/owner-daily:
    get:
      tags: [Reports]
      operationId: readOwnerDailyControl
      summary: Read owner daily cash, due, pending, and activity control baseline
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/daily-report:
    get:
      tags: [Reports]
      operationId: readDailyReport
      summary: Read daily purchase, sales, expense, and cash movement report baseline
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/profit-cost-analysis:
    get:
      tags: [Reports]
      operationId: readProfitCostAnalysis
      summary: Read Profit & Cost Analysis baseline from purchase, sales, COGS, stock, product, party, and channel sources
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: branchId
          in: query
          schema:
            type: string
        - name: purchaseChannelId
          in: query
          schema:
            type: string
        - name: salesChannelId
          in: query
          schema:
            type: string
        - name: supplierId
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: string
        - name: metalGroup
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/pending-sales:
    get:
      tags: [Reports]
      operationId: readPendingSales
      summary: Read Pending Sales baseline from PO Sell, PO Buy, purchase pool, stock, LME reference, and product/customer sources
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/sales-plan:
    get:
      tags: [Reports]
      operationId: readSalesPlan
      summary: Read Sales Plan design baseline from stock, pending-sales, and LME reference sources without enabling planning writes
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/sales-commission:
    get:
      tags: [Reports]
      operationId: readSalesCommission
      summary: Read Sales Tracking and commission baseline from purchase bills, suppliers, and salespersons
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/cash-flow-calendar:
    get:
      tags: [Reports]
      operationId: readCashFlowCalendar
      summary: Read Cash Flow Calendar baseline from cash/bank accounts and bank statement daily movement
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/business-calendar:
    get:
      tags: [Reports]
      operationId: readBusinessCalendar
      summary: Read Business Calendar baseline from purchase, sales, expense, receipt, and payment daily aggregates
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/cash-others-summary:
    get:
      tags: [Reports]
      operationId: readCashOthersSummary
      summary: Read Cash & Others Summary baseline from cash, AR/AP, stock, pending issue, trading, and expense sources
      parameters:
        - name: asOf
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/anomaly-detector:
    get:
      tags: [Reports]
      operationId: readAnomalyDetector
      summary: Run read-only anomaly scan across cash, stock, AR/AP, bill math, trading, daily, and master-data checks
      parameters:
        - name: asOf
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/company-profile:
    get:
      tags: [Admin]
      summary: Read company profile used for print/header data
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      tags: [Admin]
      summary: Update company profile
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/auth-events:
    get:
      tags: [Admin]
      summary: List unified audit and activity events from app_audit_logs and app_activity_logs
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/activity:
    post:
      tags: [Admin]
      summary: Record authenticated best-effort user activity
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/transaction-ledger:
    get:
      tags: [Admin]
      summary: List transaction ledger entries
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, xlsx]
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List app users, roles, permissions, and branch access data
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      summary: Create an app user shell and role/profile assignment
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}:
    patch:
      tags: [Admin]
      summary: Update an app user profile, role, or permission settings
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/status:
    patch:
      tags: [Admin]
      summary: Activate or deactivate an app user
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/invite:
    post:
      tags: [Admin]
      summary: Send or resend an auth invitation for an app user
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/daily/payment-approval:
    get:
      tags: [Daily]
      summary: List payment approval queue for purchase bills, advance payments, and expenses
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Approve selected payment queue items and create PMA snapshots
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/expenses:
    get:
      tags: [Daily]
      summary: List expenses
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Create an expense and related bank statement row when applicable
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/transfers:
    get:
      tags: [Daily]
      summary: List account transfers
      description: Returns transfer documents keyed outward by `doc_no`, with source/destination account display names, amount, fee, and creator from `created_by`.
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Create a transfer and deterministic bank statement rows
      description: Creates or updates an account transfer. The UI keeps `docNo`, transfer date, and creator system-managed: new transfer dates default to today, `doc_no` is generated by the server when absent, and creator is taken from the authenticated actor. The write path creates paired `TRF` bank statement rows in the same transaction.
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/petty-advances:
    get:
      tags: [Daily]
      summary: List petty advances and director loans
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
    post:
      tags: [Daily]
      summary: Create a petty advance or director loan
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/petty-advances/returns:
    post:
      tags: [Daily]
      summary: Record a petty advance return
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/daily/bill-swap-history:
    get:
      tags: [Daily]
      summary: List supplier swap history for bills
      responses:
        "200":
          $ref: "#/components/responses/ListOk"

  /api/finance-accounting/asset-register:
    get:
      tags: [Finance Accounting]
      operationId: listFinanceAccountingAssetRegister
      summary: List fixed asset register rows with NBV and depreciation summaries
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/pl-statement:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingPlStatement
      summary: Read management P&L baseline derived from operational transaction tables
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/tax-vat-wht:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingTaxVatWht
      summary: Read transaction-derived VAT/WHT management summary
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/financial-dashboard:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingFinancialDashboard
      summary: Read aggregated finance dashboard from P&L, balance sheet, cash planning, working capital, and stock finance baselines
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/cash-flow-analysis:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingCashFlowAnalysis
      summary: Read cash flow planning analysis from operational cash, AR/AP, stock, and payment sources
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/cf-forecast-calendar:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingCfForecastCalendar
      summary: Read daily cash flow forecast calendar from AR/AP, expense, loan, and tax due events
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/working-capital:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingWorkingCapital
      summary: Read working capital analysis from AR/AP, stock, cash, sales, purchase, and current loan sources
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/stock-finance:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingStockFinance
      summary: Read stock finance analysis from stock ledger and product master data
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/profit-leak:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingProfitLeak
      summary: Read profit leak dashboard from sales margin, expenses, stock loss, production loss, FX, interest, and bank fee sources
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/balance-sheet:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingBalanceSheet
      summary: Read management balance sheet baseline derived from cash, AR/AP, stock, asset, loan, and equity sources
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/cash-flow-statement:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingCashFlowStatement
      summary: Read management direct-method cash flow baseline from bank statement rows
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/depreciation:
    get:
      tags: [Finance Accounting]
      operationId: listFinanceAccountingDepreciation
      summary: List depreciation history and assets eligible for read-only run preview
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/asset-disposal:
    get:
      tags: [Finance Accounting]
      operationId: listFinanceAccountingAssetDisposal
      summary: List asset disposal read-design state and active asset options
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/loan-contracts:
    get:
      tags: [Finance Accounting]
      operationId: listFinanceAccountingLoanContracts
      summary: List loan, leasing, and BSL contracts with read-only schedule/payment state
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/loan-dashboard:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingLoanDashboard
      summary: Read loan outstanding, due, overdue, and debt-type dashboard
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/asset-overview:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingAssetOverview
      summary: Read Net Worth / Track Asset management overview from financial dashboard and cash/others sources
      parameters:
        - in: query
          name: asOf
          schema:
            type: string
            format: date
          required: false
        - in: query
          name: branchId
          schema:
            type: string
          required: false
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/equity-maint:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingEquity
      summary: Read equity and retained earnings maintenance baseline
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/opening-balance:
    get:
      tags: [Finance Accounting]
      operationId: readFinanceAccountingOpeningBalance
      summary: Read opening balance singleton and account opening balances
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance-accounting/historical-data:
    get:
      tags: [Finance Accounting]
      operationId: listFinanceAccountingHistoricalData
      summary: List historical monthly baseline cells for pre-go-live periods
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance/ap:
    get:
      tags: [Finance]
      operationId: listFinanceAp
      summary: List AP aging and supplier payable baseline
      parameters:
        - name: branchId
          in: query
          schema:
            type: string
        - name: supplierId
          in: query
          schema:
            type: string
        - name: channelId
          in: query
          schema:
            type: string
        - name: bucket
          in: query
          schema:
            type: string
            enum: [Current, 1-30, 31-60, 61-90, ">90"]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sortKey
          in: query
          schema:
            type: string
            enum: [date, docNo, dueDate, payableBalance, supplierName, aging]
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: format
          in: query
          schema:
            type: string
            enum: [json, xlsx]
            default: json
      responses:
        "200":
          description: AP aging payload or xlsx export when `format=xlsx`.
          content:
            application/json:
              schema:
                type: object
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/finance/ar:
    get:
      tags: [Finance]
      operationId: listFinanceAr
      summary: List AR aging and customer receivable baseline
      parameters:
        - name: branchId
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: string
        - name: channelId
          in: query
          schema:
            type: string
        - name: bucket
          in: query
          schema:
            type: string
            enum: [Current, 1-30, 31-60, 61-90, ">90"]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sortKey
          in: query
          schema:
            type: string
            enum: [date, docNo, dueDate, receivableBalance, customerName, aging]
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
