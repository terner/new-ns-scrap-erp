  /api/sales/receipts:
    get:
      tags: [Sales]
      operationId: listCustomerReceipts
      summary: List customer receipt queue/history
      description: >
        Returns active receiving accounts, active customers, outstanding Sales Bills
        with positive receivable balance, active payment methods, and RCP history
        from the `customer_receipts` header/allocation contract. The queue is
        served through separate indexed outstanding-SB and active-allocation-SB
        query paths, then merged by Sales Bill `doc_no` while preserving the
        response shape.
      responses:
        "200":
          $ref: "#/components/responses/ListOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Sales]
      operationId: createCustomerReceipt
      summary: Create customer receipt and allocate AR
      description: >
        Creates one `customer_receipts` header, one or more
        `customer_receipt_allocations`, compatibility `receipts` line facts,
        a `bank_statement` money-in row, and Sales Bill balance/status updates
        in one database transaction. Business references are outward codes/doc
        numbers only: customer code, account code, payment method code/name,
        and Sales Bill doc no.
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    patch:
      tags: [Sales]
      operationId: mutateCustomerReceipt
      summary: Cancel or replace customer receipt and reverse AR/cash effects
      description: >
        Supports `action = cancel` and `action = replace`. Cancel marks
        receipt/allocation facts cancelled, appends a reversing bank statement
        row with `ref_type = RCP-CANCEL`, restores Sales Bill received/balance/
        status values, and appends receipt/SB status logs. Replace uses the
        same reversal path and then creates a new RCP from the supplied
        replacement values in the same transaction; the original receipt facts
        are not deleted and no in-place silent mutation is used.
      requestBody:
        $ref: "#/components/requestBodies/JsonBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

